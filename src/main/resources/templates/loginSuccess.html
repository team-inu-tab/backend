<!DOCTYPE html>
<html lang="ko-KR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Success</title>
</head>

<body>
<h1>login Success</h1>
<button onclick="getHello()">get hello</button>
<button onclick="refresh()">refresh</button>
<button onclick="storeUserInfo()">store student info</button>
<button onclick="storeWorkerInfo()">store worker info</button>
<br />
<div style="border: 1px solid grey; width: fit-content; margin: 20px 0;">
    <input id="fileInput" type="file">
    <button onclick="storeFile()">submit</button>
</div>
<br />
<div>
    <input id="emailId" type="number" placeholder="이메일 id">
    <input id="fileName" type="text" placeholder="파일 이름">
    <button onclick="getFile()">get file</button>
</div>
<br>
<button onclick="logout()" style="color: red;">logout</button>
<script>
    let accessToken = "";

    async function getFile(){
        const emailId = document.getElementById("emailId").value;
        const fileName = document.getElementById("fileName").value;

        try{
            const response = await fetch(`http://beancp.com:8089/mails/${emailId}/file/${fileName}`, {
                method: "GET",
                credentials: "include",
                headers: {
                    Authorization: accessToken,
                }
            })
            if(response.ok){
                alert('파일 수신 성공');
            }else{
                alert('파일 수신 실패');
            }
        }catch(error){
            alert("파일 수신 중 오류 발생")
        }
    }

    async function storeFile() {
        const fileInput = document.getElementById('fileInput');
        if (fileInput.files.length === 0) {
            alert('파일을 선택해주세요.');
            return;
        }
        const formData = new FormData();
        formData.append('file', fileInput.files[0]);

        try {
            const response = await fetch('http://beancp.com:8089/fileUploadSample', {
                method: 'POST',
                headers: {
                    Authorization: accessToken,
                },
                body: formData,
                credentials: "include"
            });

            if (response.ok) {
                alert('파일 업로드 성공');
            } else {
                alert('파일 업로드 실패');
            }
        } catch (error) {
            console.error('업로드 중 오류 발생:', error);
            alert('파일 업로드 중 오류 발생');
        }
    }

    function getHello() {
        fetch("http://beancp.com:8089/hello", {
            method: "GET",
            credentials: "include",
            headers: {
                Authorization: accessToken,
            }
        })
            .then(res => res.json())
            .then(data => {
                console.log(data)
                alert(JSON.stringify(data))
            })
    }

    function refresh() {
        fetch("http://beancp.com:8089/oauth2/reissue", {
            method: "POST",
            credentials: "include"
        })
            .then(res => {
                if (res.status === 200) {
                    alert("refresh done!")
                    accessToken = res.headers.get("Authorization");
                } else {
                    alert("refresh fail..")
                }
            })
    }

    function storeUserInfo() {
        fetch("http://beancp.com:8089/users/info/student", {
            method: "post",
            credentials: "include",
            headers: {
                Authorization: accessToken,
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                studentDepartment: "컴퓨터공학부",
                studentNum: 201901630
            })
        }).then(res => {
            if (res.status === 200) {
                alert('save success!')
            } else {
                alert('save fail...')
            }
        })
            .catch(error => alert(error))
    }

    function storeWorkerInfo() {
        fetch("http://beancp.com:8089/users/info/worker", {
            method: "post",
            credentials: "include",
            headers: {
                Authorization: accessToken,
                "Content-Type": "application/json",
            },
            body: JSON.stringify({
                "company": "카카오",
                "workerDepartment": "개발",
                "position": "대리"
            })
        }).then(res => {
            if (res.status === 200) {
                alert('save success!')
            } else {
                alert('save fail...')
            }
        })
    }

    function logout() {
        fetch("http://beancp.com:8089/oauth2/logout", {
            method: "post",
            credentials: "include",
            headers: {
                Authorization: accessToken
            }
        }).then(res => {
            if (res.status === 200) {
                alert("logout success!")
                window.location.href = "http://beancp.com:5500/testLoginPage.html"
            }
        })
    }
</script>
</body>

</html>
